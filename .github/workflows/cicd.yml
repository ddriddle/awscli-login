name: CI/CD

on: [push, pull_request]

jobs:
  env:
    - TOX_PARALLEL_NO_SPINNER: 1

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0  # setuptools_scm needs this to calculate the version

    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: 3.9

    - name: Get date
      id: date
      run: echo "::set-output name=week::$(date '+%U')"

    - name: Cache python site-package
      uses: actions/cache@v2
      id: python
      with:
        path: |
            ${{ env.pythonLocation}}/bin
            ${{ env.pythonLocation}}/lib/python3.9/site-packages
        key: ${{ runner.os }}-build-python-${{ steps.date.outputs.week }}-${{ secrets.CACHE_VERSION }}

    - name: Validate python site-package
      uses: ./.github/actions/cache-validation
      id: cache
      with:
        path: |
            ${{ env.pythonLocation}}/bin
            ${{ env.pythonLocation}}/lib/python3.9/site-packages
        cache_hit: ${{ steps.python.outputs.cache-hit }}

    - name: Upgrade pip
      if: steps.cache.outputs.valid != 'true'
      run: |
        python -m pip install --upgrade --upgrade-strategy eager pip

    - name: Install build dependencies
      if: steps.cache.outputs.valid != 'true'
      run: |
        make deps-build

    - name: Lint
      run: make lint

    - name: Static Analysis
      run: make static

    - name: Build
      run: make build

    - name: Check build
      run: make check

    - name: Archive build artifacts
      uses: actions/upload-artifact@v2
      with:
        name: build
        path: |
            .lint
            .static
            .twinecheck
            dist
            build

  test:
    runs-on: ${{ matrix.os }}
    needs: build

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v2

    # Setting up multiple versions of Python is MUCH faster than
    # using a matrix!
    - name: Set up Python 3.5
      uses: actions/setup-python@v2
      with:
        python-version: 3.5

    - name: Set up Python 3.6
      uses: actions/setup-python@v2
      with:
        python-version: 3.6

    - name: Set up Python 3.7
      uses: actions/setup-python@v2
      with:
        python-version: 3.7

    - name: Set up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: 3.8

    # Last python installed is the default
    - name: Set up Python 3.9
      id: python-default
      uses: actions/setup-python@v2
      with:
        python-version: 3.9

    - name: Download build artifacts
      uses: actions/download-artifact@v2
      with:
        name: build

    - name: Get date
      id: date
      run: echo "::set-output name=week::$(date '+%U')"

    - name: Use Unix Paths
      if: matrix.os != 'windows-latest'
      run: |
        echo "PYTHON_BIN=$pythonLocation/bin" >> $GITHUB_ENV
        echo "PYTHON_LIB=$pythonLocation/lib/python3.9/site-packages" >> $GITHUB_ENV
      env:
        PYTHON_VERSION: ${{ matrix.python-version }}
      shell: bash

    - name: Use Windows Paths
      if: matrix.os == 'windows-latest'
      run: |
        echo "PYTHON_BIN=$pythonLocation\\Scripts" >> $GITHUB_ENV
        echo "PYTHON_LIB=$pythonLocation\\Lib\\site-packages" >> $GITHUB_ENV
      shell: bash

    - name: DEBUG
      run: |
        ls $PYTHON_BIN
        echo "--------------------"
        ls $PYTHON_LIB
        echo "--------------------"
        ls -lR $pythonLocation
      shell: bash

    - name: Cache tox virtualenv and site-package
      uses: actions/cache@v2
      id: python
      with:
        path: |
            .tox
            ${{ env.PYTHON_BIN }}
            ${{ env.PYTHON_LIB }}
        key: ${{ runner.os }}-tox-tests-python-${{ hashFiles('**/setup.py', '**/tox.ini') }}-${{ steps.date.outputs.week }}-${{ secrets.CACHE_VERSION }}

    - name: Validate tox virtualenv and site-package
      uses: ./.github/actions/cache-validation
      id: cache
      with:
        path: |
            .tox
            ${{ env.PYTHON_BIN }}
            ${{ env.PYTHON_LIB }}
        cache_hit: ${{ steps.python.outputs.cache-hit }}

    # touch cache and tox env so make will not rebuild them
    - name: Update timestamps
      if: steps.cache.outputs.valid == 'true'
      run: touch -c cache .tox/wheel/pyvenv.cfg
      shell: bash

    # Remove cache and tox env to force make to rebuild them
    - name: Remove invalid files
      if: steps.cache.outputs.valid != 'true'
      run: rm -rf cache .tox
      shell: bash

    - name: Install system dependencies
      if: matrix.os == 'ubuntu-latest' && steps.cache.outputs.valid != 'true'
      run: |
        sudo apt-get install -y libxml2-dev libxslt-dev

    - name: Upgrade pip
      if: steps.cache.outputs.valid != 'true'
      run: |
        python -m pip install --upgrade --upgrade-strategy eager pip

    - name: Install tox
      if: steps.cache.outputs.valid != 'true'
      run: |
        python -m pip install --upgrade --upgrade-strategy eager tox wheel

    - name: Build tox environments
      if: steps.cache.outputs.valid != 'true'
      run: |
        tox --installpkg dist/*.whl --notest --parallel
      shell: bash

    - name: Run tox tests
      run: |
        tox --skip-pkg-install --parallel

